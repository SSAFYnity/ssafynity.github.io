name: 빌드 및 GitHub Pages 배포

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: 배포
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: 의존성 설치
        run: npm ci

      - name: 타입 및 Astro 설정 검증
        run: npm run check

      - name: 빌드
        run: npm run build

      - name: Pages 설정
        uses: actions/configure-pages@v4

      - name: 빌드 결과물 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: GitHub Pages 배포
        uses: actions/deploy-pages@v4
        id: deployment
